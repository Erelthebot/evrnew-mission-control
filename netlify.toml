[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[dev]
  command = "npm run dev -- --port 3001"
  port = 3000
  targetPort = 3001
  framework = "next"
  autoLaunch = false
